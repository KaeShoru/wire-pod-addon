name: Wire-Pod for Vector
version: 1.0.5
slug: wire-pod
description: Home Assistant Add-on for Anki Vector robot with Wire-Pod integration
init: false
arch:
  - aarch64
  - armv7
ports:
  8080/tcp: 8080
  webui: http://[HOST]:[PORT:8080]
map:
  - config:rw
  - data:rw
options:
  stt_service:
    name: STT Service
    description: Speech-to-Text service to use
    required: true
    default: vosk
    options:
      - vosk
      - whisper
      - coqui
  language:
    name: Language
    description: Language for STT service
    required: true
    default: en-us
    options:
      - en-us
      - es-es
      - fr-fr
      - de-de
      - it-it
      - ru-ru
  mqtt_broker_host:
    name: MQTT Broker Host
    description: Home Assistant MQTT broker address
    required: true
    default: core-mosquitto
  mqtt_broker_port:
    name: MQTT Broker Port
    description: Home Assistant MQTT broker port
    required: true
    default: 1883
  mqtt_username:
    name: MQTT Username
    description: MQTT authentication username
    default: addon
  mqtt_password:
    name: MQTT Password
    description: MQTT authentication password (leave empty for core-mosquitto)
    default: ""
  mqtt_topic_prefix:
    name: MQTT Topic Prefix
    description: Prefix for MQTT topics
    required: true
    default: homeassistant/vector
  mqtt_discovery:
    name: Enable MQTT Discovery
    description: Automatically publish discovery config to Home Assistant
    default: true
    options:
      - "true"
      - "false"
  mqtt_discovery_prefix:
    name: MQTT Discovery Prefix
    description: Prefix for MQTT discovery topics
    default: homeassistant
  telemetry_interval:
    name: Telemetry Interval
    description: How often to send battery/status to MQTT
    default: 60
  vector_esn:
    name: Vector ESN
    description: ESN of your Vector robot (e.g., 006044c4)
    required: true
  web_ui_enabled:
    name: Enable Web UI
    description: Enable Wire-Pod web interface (http://[HOST]:[PORT:8080))
    default: true
    options:
      - "true"
      - "false"
schema:
  type: object
  required:
    - stt_service
    - language
    - mqtt_broker_host
    - mqtt_broker_port
    - mqtt_username
    - mqtt_discovery
    - mqtt_discovery_prefix
    - telemetry_interval
    - vector_esn
  type: object
  properties:
    stt_service:
      type: string
    language:
      type: string
    mqtt_broker_host:
      type: string
    mqtt_broker_port:
      type: integer
      minimum: 1
      maximum: 65535
    mqtt_username:
      type: string
    mqtt_password:
      type: string
    mqtt_topic_prefix:
      type: string
    mqtt_discovery:
      type: boolean
    mqtt_discovery_prefix:
      type: string
    telemetry_interval:
      type: integer
    vector_esn:
      type: string
    web_ui_enabled:
      type: boolean
image: ghcr.io/kaeshoru/wire-pod-addon:latest
ingress: true
ingress_port: 8080
ingress_path: /wire-pod
